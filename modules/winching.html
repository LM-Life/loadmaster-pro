<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="stylesheet" href="../style.css" />
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>Loadmaster Pro | WINCHING</title>
  <script src="../common.js" defer></script>
  <script src="./winching.js" defer></script>
</head>
<body class="module-page winching-page">
  <div class="container">
    <a class="home-button" href="../index.html">🏠 Home</a>

    <h1>WINCHING</h1>

    <div class="card">
      <div>
        <label for="winchWeight">Cargo Weight (lbs)</label>
        <input
          type="text"
          inputmode="numeric"
          pattern="[0-9]*"
          autocomplete="off"
          autocorrect="off"
          autocapitalize="off"
          spellcheck="false"
          id="winchWeight"
          placeholder="e.g., 22000"
        />
      </div>

      <div class="grid-2 mt-1">
        <div>
          <label for="winchRamp">Ramp Angle</label>
          <select id="winchRamp">
            <option value="0">Level Ramp (0°)</option>
            <option value="3.8">Long ADS with Plugs (3.8°)</option>
            <option value="5">Long ADS Only (5°)</option>
            <option value="15">Normal Ramp / Toes Down (15°)</option>
          </select>
        </div>

        <div>
          <label for="winchSurface">Surface Type</label>
          <select id="winchSurface">
            <option value="pneumatic">Pneumatic Tires</option>
            <option value="tracks">Tracks</option>
            <option value="steel">Steel/Hard Rubber Wheels</option>
            <option value="roller">Roller Conveyors</option>
            <option value="greased">Greased Shoring</option>
            <option value="dry">Dry Shoring</option>
            <option value="skids">Skids on Non-Skid</option>
            <option value="nonskid">Non-Skid Surface</option>
          </select>
        </div>
      </div>

      <div class="grid-2 mt-1">
        <button type="button" id="calcWinchingBtn" class="btn-primary">Calculate Required Snatch Blocks</button>
        <button type="button" id="clearWinchingBtn" class="btn-danger">Clear All</button>
      </div>

      <div id="winchResult" class="result-card mt-1" aria-live="polite"></div>
    </div>
  </div>
</body>
</html>
